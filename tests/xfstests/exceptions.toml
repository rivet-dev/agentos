[[exceptions]]
id = "generic/014"
backend = "object_s3"
disposition = "reduced"
reason = "object_s3 is a whole-object filesystem; each upstream loop performs a random write and truncate on an object up to 256 MiB, so exact focused coverage and 100 randomized loops preserve the sparse assertions without repeating whole-object copies only for stress volume."
tracking_issue = "ISSUES.md#f-014"
reduction = "truncfile-iterations"
full_iterations = 10000
reduced_iterations = 100
focused_coverage = "cargo test -p agentos-vfs-core --test conformance object_fs_whole_object_sparse_mutations_preserve_semantics -- --exact"


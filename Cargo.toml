[workspace]
resolver = "2"
members = [
    "crates/agent-os-protocol",
    "crates/agent-os-sidecar",
    "crates/agent-os-sidecar-browser",
    "crates/client",
]

[workspace.package]
version = "0.2.0-rc.3"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/rivet-dev/agent-os"

# Internal crates are published to crates.io as a lock-step chain. Each entry
# carries both a path (for in-workspace builds) and a version (required so
# `cargo publish` can emit a registry-resolvable dependency). The release
# tooling rewrites these versions together with `workspace.package.version`.
[workspace.dependencies]
agent-os-bridge = { package = "secure-exec-bridge", version = "0.3.0" }
agent-os-protocol = { path = "crates/agent-os-protocol", version = "0.2.0-rc.3" }
agent-os-sidecar = { path = "crates/agent-os-sidecar", version = "0.2.0-rc.3" }
agent-os-sidecar-browser = { path = "crates/agent-os-sidecar-browser", version = "0.2.0-rc.3" }
agent-os-kernel = { package = "secure-exec-kernel", version = "0.3.0" }
agent-os-execution = { package = "secure-exec-execution", version = "0.3.0" }
agent-os-v8-runtime = { package = "secure-exec-v8-runtime", version = "0.3.0" }
secure-exec-client = { version = "0.3.0" }
secure-exec-bridge = { version = "0.3.0" }
secure-exec-sidecar = { version = "0.3.0" }
secure-exec-sidecar-browser = { version = "0.3.0" }
secure-exec-vm-config = { version = "0.3.0" }
vbare = "0.0.4"
vbare-compiler = { package = "rivet-vbare-compiler", version = "0.0.5" }

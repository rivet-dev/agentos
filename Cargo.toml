[workspace]
resolver = "2"
members = [
    "crates/agentos-protocol",
    "crates/agentos-sidecar",
    # NOTE: crates/agentos-sidecar-browser is intentionally excluded from the
    # default workspace members. It path/version-depends on
    # `secure-exec-sidecar-browser`, which secure-exec does not publish to
    # crates.io. Keeping it a member would make the whole workspace unresolvable
    # from crates.io (the dylib preview pins secure-exec to published crates.io
    # `0.3.0`). It is unrelated to the actor-plugin cdylib + sidecar binary the
    # preview ships. Re-add it once secure-exec publishes the browser crate.
    "crates/client",
    "crates/agentos-actor-plugin",
]

[workspace.package]
version = "0.2.0-rc.3"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/rivet-dev/agent-os"

# Internal crates are published to crates.io as a lock-step chain. Each entry
# carries both a path (for in-workspace builds) and a version (required so
# `cargo publish` can emit a registry-resolvable dependency). The release
# tooling rewrites these versions together with `workspace.package.version`.
[workspace.dependencies]
agentos-bridge = { package = "secure-exec-bridge", version = "0.3.0" }
agentos-protocol = { path = "crates/agentos-protocol", version = "0.2.0-rc.3" }
agentos-sidecar = { path = "crates/agentos-sidecar", version = "0.2.0-rc.3" }
agentos-sidecar-browser = { path = "crates/agentos-sidecar-browser", version = "0.2.0-rc.3" }
agentos-kernel = { package = "secure-exec-kernel", version = "0.3.0" }
agentos-execution = { package = "secure-exec-execution", version = "0.3.0" }
agentos-v8-runtime = { package = "secure-exec-v8-runtime", version = "0.3.0" }
secure-exec-client = { version = "0.3.0" }
secure-exec-bridge = { version = "0.3.0" }
secure-exec-sidecar = { version = "0.3.0" }
secure-exec-sidecar-browser = { version = "0.3.0" }
secure-exec-vm-config = { version = "0.3.0" }
vbare = "0.0.4"
vbare-compiler = { package = "rivet-vbare-compiler", version = "0.0.5" }
